<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Conferencias Pro - Ricardo</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <style>
        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }

        /* Contenedor dinámico de cuadrícula */
        #video-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 10px; 
            padding: 10px; 
            flex-grow: 1;
            background: #111;
            align-content: center;
            justify-content: center;
        }

        /* Estilo para cada cuadro de video (Relación 1:1) */
        .video-player { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            background: black; 
            border: 2px solid #00ff88; 
            border-radius: 8px; 
            overflow: hidden; 
            position: relative;
        }

        video { object-fit: cover !important; }

        .controls { 
            background: #1a1a1a; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            gap: 20px;
            border-top: 1px solid #333;
        }

        button { 
            padding: 15px 30px; 
            border: none; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }

        .join-btn { background: #00ff88; color: #000; }
        .leave-btn { background: #ff4757; color: white; display: none; }
        
        #status { position: absolute; top: 10px; left: 10px; font-size: 12px; color: #00ff88; z-index: 10; }
    </style>
</head>
<body>

    <div id="status">Desconectado</div>
    <div id="video-grid">
        </div>

    <div class="controls">
        <button id="joinBtn" class="join-btn" onclick="unirseASala()">UNIRSE A LA CONFERENCIA</button>
        <button id="leaveBtn" class="leave-btn" onclick="salirDeSala()">ABANDONAR</button>
    </div>

    <script>
        const APP_ID = "4c0f8c14a76d4a33a53972aaa48519a4"; 
        const CHANNEL = "sala_conferencias_ricardo";
        
        // Modo 'rtc' es para conferencias grupales de baja latencia
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };

        async function unirseASala() {
            try {
                // 1. Unirse al canal
                await client.join(APP_ID, CHANNEL, null);
                
                // 2. Crear pistas de audio y video
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack();
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();

                // 3. Crear el contenedor para MI video
                crearContenedorVideo("local-user");
                localTracks.videoTrack.play("local-user");

                // 4. Publicar mis pistas para que otros me vean/escuchen
                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);

                // Ajustar interfaz
                document.getElementById('joinBtn').style.display = "none";
                document.getElementById('leaveBtn').style.display = "block";
                document.getElementById('status').innerText = "CONECTADO EN SALA";

                // 5. Manejar usuarios que se unen
                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    
                    if (mediaType === "video") {
                        crearContenedorVideo(user.uid);
                        user.videoTrack.play(user.uid.toString());
                    }
                    if (mediaType === "audio") {
                        user.audioTrack.play();
                    }
                });

                // 6. Manejar usuarios que se van
                client.on("user-left", (user) => {
                    const player = document.getElementById(user.uid);
                    if (player) player.remove();
                });

            } catch (e) {
                console.error(e);
                alert("Error al unirse: Revisa cámara y micrófono.");
            }
        }

        function crearContenedorVideo(id) {
            if (document.getElementById(id)) return;
            const videoDiv = document.createElement("div");
            videoDiv.id = id;
            videoDiv.className = "video-player";
            document.getElementById("video-grid").appendChild(videoDiv);
        }

        async function salirDeSala() {
            for (let trackName in localTracks) {
                if (localTracks[trackName]) {
                    localTracks[trackName].stop();
                    localTracks[trackName].close();
                    localTracks[trackName] = null;
                }
            }
            await client.leave();
            document.getElementById("video-grid").innerHTML = "";
            document.getElementById('joinBtn').style.display = "block";
            document.getElementById('leaveBtn').style.display = "none";
            document.getElementById('status').innerText = "Has salido de la sala";
        }
    </script>
</body>
</html>
