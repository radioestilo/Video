<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala Pro - Ricardo (9:16 Dual Column)</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <style>
        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        /* Grid optimizado para 2 columnas fijas y formato 9:16 */
        #video-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* Fuerza las 2 columnas */
            max-width: 900px; /* Ajuste para que no se estiren demasiado en horizontal */
            margin: 0 auto;
            gap: 10px; 
            padding: 10px; 
            flex-grow: 1;
            background: #111;
            overflow-y: auto;
            align-content: center; /* Centra el bloque de videos verticalmente */
            justify-content: center; 
            width: 100%;
        }

        /* Cuadros estrictamente 9:16 */
        .video-player { 
            width: 100%; 
            aspect-ratio: 9 / 16; 
            background: black; 
            border: 2px solid #00ff88; 
            border-radius: 12px; 
            overflow: hidden; 
            position: relative;
            justify-self: center;
            cursor: pointer;
            transition: all 0.3s ease-out;
        }

        /* Lógica para cuando hay una sola persona: se centra en las dos columnas */
        .video-player:first-child:last-child {
            grid-column: 1 / span 2;
            max-width: 50%; /* Evita que ocupe todo el ancho y pierda el sentido 9:16 */
        }

        /* Estilo para el video maximizado */
        .video-player.maximized {
            grid-column: 1 / span 2 !important;
            max-width: 85% !important;
            border: 4px solid #3498db;
            z-index: 50;
        }

        video { object-fit: cover !important; }

        .user-controls {
            position: absolute;
            bottom: 15px;
            left: 15px;
            z-index: 10;
            display: flex;
            gap: 8px;
        }

        button { 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s;
        }

        .mute-btn {
            background: rgba(255, 71, 87, 0.8);
            color: white;
            padding: 8px 12px;
            font-size: 11px;
        }

        .switch-btn {
            background: rgba(52, 152, 219, 0.8);
            color: white;
            padding: 10px;
            font-size: 16px;
            display: none; 
        }

        .join-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .join-btn { 
            padding: 20px 40px; 
            border-radius: 50px; 
            font-size: 18px;
            background: #000;
            color: white;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px #ff0000; }
            33% { box-shadow: 0 0 15px #00ff00; }
            66% { box-shadow: 0 0 15px #0000ff; }
            100% { box-shadow: 0 0 10px #ff0000; }
        }

        .controls-bar { 
            background: #1a1a1a; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            gap: 15px;
            border-top: 1px solid #333;
        }

        .leave-btn { background: #ff4757; color: white; padding: 12px 25px; border-radius: 8px; }
        .pip-btn { background: #3498db; color: white; padding: 12px 25px; border-radius: 8px; display: none; }
        #status { position: absolute; top: 10px; left: 10px; font-size: 12px; color: #00ff88; z-index: 10; }
    </style>
</head>
<body>

    <div id="status">Desconectado</div>

    <div id="joinArea" class="join-container">
        <button class="join-btn" onclick="unirseASala()">UNIRSE A LA CONFERENCIA</button>
    </div>

    <div id="video-grid"></div>

    <div id="footerControls" class="controls-bar" style="display: none;">
        <button id="pipBtn" class="pip-btn" onclick="activarPiP()">FLOTANTE</button>
        <button class="leave-btn" onclick="salirDeSala()">ABANDONAR SALA</button>
    </div>

    <script>
        const APP_ID = "4c0f8c14a76d4a33a53972aaa48519a4"; 
        const CHANNEL = "sala_conferencias_ricardo";
        
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };
        let remoteUsers = {}; 
        let videoCameras = [];
        let currentCameraIndex = 0;
        let maximizedPlayerId = null;

        document.addEventListener("visibilitychange", () => {
            if (document.hidden) console.log("APK en segundo plano");
        });

        async function unirseASala() {
            try {
                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        crearContenedorVideo(user.uid, false);
                        user.videoTrack.play(user.uid + "-video");
                    }
                    if (mediaType === "audio") {
                        remoteUsers[user.uid] = user;
                        user.audioTrack.play();
                    }
                });

                client.on("user-left", (user) => {
                    const player = document.getElementById(user.uid);
                    if (player) {
                        if (user.uid === maximizedPlayerId) toggleMaximizar(user.uid);
                        player.remove();
                    }
                    delete remoteUsers[user.uid];
                });

                await client.join(APP_ID, CHANNEL, null);
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack({ AEC: true, ANS: true, AGC: true });
                videoCameras = await AgoraRTC.getCameras();
                
                if (videoCameras.length > 0) {
                    localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ cameraId: videoCameras[currentCameraIndex].deviceId });
                }

                document.getElementById('joinArea').style.display = "none";
                document.getElementById('footerControls').style.display = "flex";
                
                if (document.pictureInPictureEnabled) document.getElementById('pipBtn').style.display = "block";

                crearContenedorVideo("local-user", true);
                localTracks.videoTrack.play("local-user-video");

                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
                document.getElementById('status').innerText = "CONECTADO";

            } catch (e) {
                console.error(e);
                location.reload();
            }
        }

        function crearContenedorVideo(id, isLocal) {
            const grid = document.getElementById("video-grid");
            if (document.getElementById(id)) return;

            const container = document.createElement("div");
            container.id = id;
            container.className = "video-player";
            container.onclick = (e) => {
                if (e.target.tagName !== 'BUTTON') toggleMaximizar(id);
            };

            const videoArea = document.createElement("div");
            videoArea.id = id + "-video";
            videoArea.style.width = "100%";
            videoArea.style.height = "100%";

            const controls = document.createElement("div");
            controls.className = "user-controls";
            
            const muteBtn = document.createElement("button");
            muteBtn.className = "mute-btn";
            muteBtn.innerText = "SILENCIAR";
            muteBtn.onclick = () => togglemute(id, isLocal, muteBtn);

            if (isLocal && videoCameras.length > 1) {
                const switchBtn = document.createElement("button");
                switchBtn.className = "switch-btn";
                switchBtn.style.display = "block";
                switchBtn.innerText = "🔄";
                switchBtn.onclick = () => voltearCamara();
                controls.appendChild(switchBtn);
            }

            controls.appendChild(muteBtn);
            container.appendChild(videoArea);
            container.appendChild(controls);
            grid.appendChild(container);
        }

        async function voltearCamara() {
            try {
                if (localTracks.videoTrack && videoCameras.length > 1) {
                    await client.unpublish([localTracks.videoTrack]);
                    localTracks.videoTrack.stop();
                    localTracks.videoTrack.close();
                    currentCameraIndex = (currentCameraIndex + 1) % videoCameras.length;
                    localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack({ cameraId: videoCameras[currentCameraIndex].deviceId });
                    localTracks.videoTrack.play("local-user-video");
                    await client.publish([localTracks.videoTrack]);
                }
            } catch (error) {
                console.error(error);
            }
        }

        function toggleMaximizar(id) {
            const grid = document.getElementById('video-grid');
            const targetPlayer = document.getElementById(id);

            if (maximizedPlayerId && maximizedPlayerId !== id) {
                document.getElementById(maximizedPlayerId).classList.remove('maximized');
            }

            targetPlayer.classList.toggle('maximized');

            if (targetPlayer.classList.contains('maximized')) {
                maximizedPlayerId = id;
                grid.style.alignContent = 'start';
            } else {
                maximizedPlayerId = null;
                grid.style.alignContent = 'center';
            }
        }

        async function activarPiP() {
            try {
                const videoElement = document.getElementById("local-user-video").querySelector("video");
                if (videoElement) {
                    if (document.pictureInPictureElement) await document.exitPictureInPicture();
                    else await videoElement.requestPictureInPicture();
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function togglemute(id, isLocal, btn) {
            if (isLocal) {
                const muted = !localTracks.audioTrack.muted;
                await localTracks.audioTrack.setMuted(muted);
                btn.innerText = muted ? "ACTIVAR MIC" : "SILENCIAR";
                btn.style.background = muted ? "#2ed573" : "rgba(255, 71, 87, 0.8)";
            } else {
                const user = remoteUsers[id];
                if (user && user.audioTrack) {
                    if (user.audioTrack.isPlaying) {
                        user.audioTrack.stop();
                        btn.innerText = "ESCUCHAR";
                        btn.style.background = "#2ed573";
                    } else {
                        user.audioTrack.play();
                        btn.innerText = "SILENCIAR";
                        btn.style.background = "rgba(255, 71, 87, 0.8)";
                    }
                }
            }
        }

        async function salirDeSala() {
            if (document.pictureInPictureElement) await document.exitPictureInPicture();
            if (maximizedPlayerId) toggleMaximizar(maximizedPlayerId);
            for (let track in localTracks) {
                if (localTracks[track]) {
                    localTracks[track].stop();
                    localTracks[track].close();
                }
            }
            await client.leave();
            location.reload();
        }
    </script>
</body>
</html>
