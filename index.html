<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Monitoreo Pro - Ricardo</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        #video-container { width: 100%; max-width: 640px; height: 360px; background: #000; margin: 20px auto; border: 2px solid #333; border-radius: 12px; overflow: hidden; position: relative; }
        .controls { display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button { width: 280px; padding: 18px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .cam-btn { background: #ff4757; color: white; }
        .mon-btn { background: #2ed573; color: white; }
        #status { margin-top: 15px; color: #aaa; font-size: 14px; }
        video { object-fit: cover !important; }
    </style>
</head>
<body>

    <h2 style="color: #00ff88;">SISTEMA DE VIGILANCIA</h2>
    
    <div id="video-container">
        </div>

    <div class="controls">
        <button class="cam-btn" onclick="iniciarCamara()">1. ACTIVAR COMO CÁMARA</button>
        <button class="mon-btn" onclick="iniciarMonitor()">2. ENTRAR COMO MONITOR</button>
    </div>

    <p id="status">Esperando acción...</p>

    <script>
        // Tu App ID configurado
        const APP_ID = "4c0f8c14a76d4a33a53972aaa48519a4"; 
        const CHANNEL = "canal_monitoreo"; // Nombre del canal privado
        
        const client = AgoraRTC.createClient({ mode: "live", codec: "vp8" });
        let localTracks = { videoTrack: null };

        async function iniciarCamara() {
            try {
                document.getElementById('status').innerText = "Iniciando cámara...";
                // Configuramos como emisor
                await client.setClientRole("host");
                await client.join(APP_ID, CHANNEL, null);
                
                // Creamos la pista de video
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();
                
                // Mostramos el video localmente
                localTracks.videoTrack.play("video-container");
                
                // Publicamos para que otros lo vean
                await client.publish([localTracks.videoTrack]);
                
                document.getElementById('status').innerText = "TRANSMITIENDO EN VIVO (Deja este móvil aquí)";
                document.getElementById('status').style.color = "#ff4757";
            } catch (e) {
                console.error(e);
                alert("Error: Asegúrate de dar permisos a la cámara y usar HTTPS.");
            }
        }

        async function iniciarMonitor() {
            try {
                document.getElementById('status').innerText = "Conectando al servidor...";
                // Configuramos como audiencia
                await client.setClientRole("audience");
                await client.join(APP_ID, CHANNEL, null);

                // Escuchamos cuando alguien empiece a transmitir
                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        document.getElementById('status').innerText = "MONITOREO ACTIVO";
                        document.getElementById('status').style.color = "#2ed573";
                        user.videoTrack.play("video-container");
                    }
                });

                document.getElementById('status').innerText = "Buscando señal de la cámara...";
            } catch (e) {
                console.error(e);
                alert("Error al conectar al monitor.");
            }
        }
    </script>
</body>
</html>
