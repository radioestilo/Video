<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámara - RICARDOCASTELLAR</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 400px; border: 2px solid #0f0; border-radius: 10px; background: #111; }
        .info { margin-top: 15px; border: 1px solid #333; padding: 10px; display: inline-block; }
    </style>
</head>
<body>
    <h3>ESTACIÓN DE TRANSMISIÓN</h3>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="info">
        ID: <strong>RICARDOCASTELLAR</strong><br>
        Estado: <span id="status">Iniciando...</span>
    </div>

    <script>
        const status = document.getElementById('status');
        const videoElement = document.getElementById('localVideo');

        // Configuración con servidores STUN de Google integrados
        const peer = new Peer('RICARDOCASTELLAR', {
            config: {'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' }
            ]}
        });

        peer.on('open', (id) => {
            status.innerText = "ONLINE - ESPERANDO MONITOR";
            status.style.color = "#0f0";
        });

        peer.on('error', (err) => {
            status.innerText = "Error: " + err.type;
            status.style.color = "red";
        });

        // Solicitar cámara
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then((stream) => {
                videoElement.srcObject = stream;
                // Responder automáticamente cuando el monitor llame
                peer.on('call', (call) => {
                    console.log("Recibiendo petición de monitoreo...");
                    call.answer(stream);
                });
            })
            .catch(err => {
                status.innerText = "Error de cámara: " + err.name;
            });
    </script>
</body>
</html>
