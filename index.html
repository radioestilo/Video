<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Conferencias Pro - Ricardo</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.11.0.js"></script>
    <style>
        body { 
            background: #0a0a0a; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        /* Configuración de 2 columnas fijas y centradas */
        #video-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            max-width: 1000px;
            margin: 0 auto;
            gap: 10px; 
            padding: 10px; 
            flex-grow: 1;
            background: #111;
            overflow-y: auto;
            align-content: center; 
            justify-content: center; 
            width: 100%;
        }

        .video-player { 
            width: 100%; 
            aspect-ratio: 1 / 1; 
            background: black; 
            border: 2px solid #00ff88; 
            border-radius: 12px; 
            overflow: hidden; 
            position: relative;
        }

        /* Si solo hay una persona, se mantiene centrada */
        .video-player:last-child:nth-child(odd) {
            grid-column: 1 / span 2;
            max-width: 50%; 
            justify-self: center;
        }

        video { object-fit: cover !important; }

        .user-controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 10;
        }

        .mute-btn {
            background: rgba(255, 71, 87, 0.8);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .join-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        .join-btn { 
            padding: 20px 40px; 
            border: none; 
            border-radius: 50px; 
            font-weight: bold; 
            font-size: 18px;
            cursor: pointer;
            color: white;
            background: #000;
            position: relative;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; }
            33% { box-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00; }
            66% { box-shadow: 0 0 15px #0000ff, 0 0 30px #0000ff; }
            100% { box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000; }
        }

        .controls-bar { 
            background: #1a1a1a; 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            gap: 15px;
            border-top: 1px solid #333;
        }

        .leave-btn { background: #ff4757; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* Botón azul para PiP (Flotante) */
        .pip-btn { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; display: none; }

        #status { position: absolute; top: 10px; left: 10px; font-size: 12px; color: #00ff88; z-index: 10; }
    </style>
</head>
<body>

    <div id="status">Desconectado</div>

    <div id="joinArea" class="join-container">
        <button class="join-btn" onclick="unirseASala()">UNIRSE A LA CONFERENCIA</button>
    </div>

    <div id="video-grid"></div>

    <div id="footerControls" class="controls-bar" style="display: none;">
        <button id="pipBtn" class="pip-btn" onclick="activarPiP()">FLOTANTE</button>
        <button class="leave-btn" onclick="salirDeSala()">ABANDONAR SALA</button>
    </div>

    <script>
        const APP_ID = "4c0f8c14a76d4a33a53972aaa48519a4"; 
        const CHANNEL = "sala_conferencias_ricardo";
        
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        let localTracks = { videoTrack: null, audioTrack: null };
        let remoteUsers = {}; 

        // Escuchar cambios de visibilidad para mantener la conexión en la APK
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                console.log("APK en segundo plano - Manteniendo audio activo");
            }
        });

        async function unirseASala() {
            try {
                client.on("user-published", async (user, mediaType) => {
                    await client.subscribe(user, mediaType);
                    if (mediaType === "video") {
                        crearContenedorVideo(user.uid, false);
                        user.videoTrack.play(user.uid + "-video");
                    }
                    if (mediaType === "audio") {
                        remoteUsers[user.uid] = user;
                        user.audioTrack.play();
                    }
                });

                client.on("user-left", (user) => {
                    const player = document.getElementById(user.uid);
                    if (player) player.remove();
                    delete remoteUsers[user.uid];
                });

                await client.join(APP_ID, CHANNEL, null);
                
                // Optimizamos el audio para ejecución en segundo plano en la APK
                localTracks.audioTrack = await AgoraRTC.createMicrophoneAudioTrack({
                    AEC: true, ANS: true, AGC: true
                });
                localTracks.videoTrack = await AgoraRTC.createCameraVideoTrack();

                document.getElementById('joinArea').style.display = "none";
                document.getElementById('footerControls').style.display = "flex";

                // Mostrar botón PiP si el navegador de la APK lo permite
                if (document.pictureInPictureEnabled) {
                    document.getElementById('pipBtn').style.display = "block";
                }

                crearContenedorVideo("local-user", true);
                localTracks.videoTrack.play("local-user-video");

                await client.publish([localTracks.audioTrack, localTracks.videoTrack]);
                document.getElementById('status').innerText = "CONECTADO";

            } catch (e) {
                console.error(e);
                alert("Error al conectar.");
            }
        }

        function crearContenedorVideo(id, isLocal) {
            const grid = document.getElementById("video-grid");
            if (document.getElementById(id)) return;

            const container = document.createElement("div");
            container.id = id;
            container.className = "video-player";

            const videoArea = document.createElement("div");
            videoArea.id = id + "-video";
            videoArea.style.width = "100%";
            videoArea.style.height = "100%";

            const controls = document.createElement("div");
            controls.className = "user-controls";
            
            const muteBtn = document.createElement("button");
            muteBtn.className = "mute-btn";
            muteBtn.innerText = "SILENCIAR";
            muteBtn.onclick = () => togglemute(id, isLocal, muteBtn);

            controls.appendChild(muteBtn);
            container.appendChild(videoArea);
            container.appendChild(controls);
            grid.appendChild(container);
        }

        // Función para activar el modo flotante en la APK
        async function activarPiP() {
            try {
                // Seleccionamos el elemento de video creado por Agora
                const videoElement = document.getElementById("local-user-video").querySelector("video");

                if (videoElement) {
                    if (document.pictureInPictureElement) {
                        await document.exitPictureInPicture();
                    } else {
                        await videoElement.requestPictureInPicture();
                    }
                }
            } catch (error) {
                console.error("Error al activar modo flotante:", error);
                alert("Para usar el modo flotante, concede el permiso 'Aparecer encima' en los ajustes de la App.");
            }
        }

        async function togglemute(id, isLocal, btn) {
            if (isLocal) {
                if (localTracks.audioTrack.muted) {
                    await localTracks.audioTrack.setMuted(false);
                    btn.innerText = "SILENCIAR";
                    btn.style.background = "rgba(255, 71, 87, 0.8)";
                } else {
                    await localTracks.audioTrack.setMuted(true);
                    btn.innerText = "ACTIVAR MIC";
                    btn.style.background = "#2ed573";
                }
            } else {
                const user = remoteUsers[id];
                if (user && user.audioTrack) {
                    if (user.audioTrack.isPlaying) {
                        user.audioTrack.stop();
                        btn.innerText = "ESCUCHAR";
                        btn.style.background = "#2ed573";
                    } else {
                        user.audioTrack.play();
                        btn.innerText = "SILENCIAR";
                        btn.style.background = "rgba(255, 71, 87, 0.8)";
                    }
                }
            }
        }

        async function salirDeSala() {
            if (document.pictureInPictureElement) {
                await document.exitPictureInPicture();
            }
            for (let track in localTracks) {
                if (localTracks[track]) {
                    localTracks[track].stop();
                    localTracks[track].close();
                }
            }
            await client.leave();
            location.reload();
        }
    </script>
</body>
</html>
