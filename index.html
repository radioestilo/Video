<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámara - RICARDOCASTELLAR</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        video { width: 100%; max-width: 500px; border: 2px solid #0f0; border-radius: 10px; filter: grayscale(50%); }
        .status-box { margin-top: 20px; padding: 10px; border: 1px solid #333; display: inline-block; }
    </style>
</head>
<body>
    <h2>TRANSMISOR ACTIVO</h2>
    <video id="localVideo" autoplay playsinline muted></video>
    <div class="status-box">
        ID: <strong id="myId">RICARDOCASTELLAR</strong><br>
        Estado: <span id="status">Iniciando...</span>
    </div>

    <script>
        const status = document.getElementById('status');
        const videoElement = document.getElementById('localVideo');

        // Configuración de PeerJS con el ID fijo
        const peer = new Peer('RICARDOCASTELLAR');

        peer.on('open', (id) => {
            status.innerText = "ONLINE - Esperando Monitor";
            status.style.color = "#0f0";
        });

        peer.on('error', (err) => {
            status.innerText = "ERROR: " + err.type;
            status.style.color = "red";
            if(err.type === 'unavailable-id') alert("ID ocupado. Cierra otras pestañas.");
        });

        // Acceder a la cámara
        navigator.mediaDevices.getUserMedia({ video: true, audio: false })
            .then((stream) => {
                videoElement.srcObject = stream;
                // Responder llamadas automáticamente enviando el video
                peer.on('call', (call) => {
                    console.log("Recibiendo llamada...");
                    call.answer(stream);
                });
            })
            .catch(err => {
                status.innerText = "Error de cámara: " + err.name;
            });
    </script>
</body>
</html>
