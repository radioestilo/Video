<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor - RICARDOCASTELLAR</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; padding: 10px; }
        video { width: 100%; max-width: 600px; border-radius: 10px; background: #000; border: 2px solid #444; }
        button { background: #28a745; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; margin-top: 15px; width: 100%; max-width: 300px; }
        #log { margin-top: 15px; color: #aaa; font-size: 14px; border: 1px solid #333; padding: 10px; height: 60px; overflow: hidden; }
    </style>
</head>
<body>
    <h3>PANEL DE MONITOREO</h3>
    <video id="remoteVideo" autoplay playsinline></video>
    <br>
    <button onclick="iniciarMonitoreo()">CONECTAR AHORA</button>
    <div id="log">Estado: Listo para conectar</div>

    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const log = document.getElementById('log');

        // Configuración con servidores STUN de Google para saltar bloqueos de red
        const peer = new Peer({
            config: {'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' },
                { url: 'stun:stun2.l.google.com:19302' }
            ]}
        });

        function iniciarMonitoreo() {
            log.innerText = "Llamando a RICARDOCASTELLAR...";
            log.style.color = "yellow";
            
            // Llamada forzada
            const call = peer.call('RICARDOCASTELLAR', new MediaStream());

            call.on('stream', (remoteStream) => {
                log.innerText = "¡CONEXIÓN EXITOSA!";
                log.style.color = "#0f0";
                remoteVideo.srcObject = remoteStream;
                remoteVideo.play();
            });

            peer.on('error', (err) => {
                log.style.color = "red";
                if(err.type === 'peer-unavailable') {
                    log.innerText = "ERROR: La cámara no está abierta en el otro dispositivo.";
                } else {
                    log.innerText = "Error: " + err.type;
                }
            });
        }
    </script>
</body>
</html>
