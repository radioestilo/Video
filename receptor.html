<video id="remoteVideo" autoplay playsinline muted style="width: 90%; max-height: 70vh; border: 3px solid #333; border-radius: 15px;"></video>

<script>
    const remoteVideo = document.getElementById('remoteVideo');
    const info = document.getElementById('info');
    
    // Agregamos un servidor STUN público por si estás usando datos móviles (4G)
    const peer = new Peer({
        config: {'iceServers': [
            { url: 'stun:stun.l.google.com:19302' },
            { url: 'stun:stun1.l.google.com:19302' }
        ]}
    });

    function conectar() {
        info.innerText = "Conectando con RICARDOCASTELLAR...";
        
        // Intentamos la llamada
        const call = peer.call('RICARDOCASTELLAR', new MediaStream());

        call.on('stream', (remoteStream) => {
            info.innerText = "¡CONECTADO!";
            remoteVideo.srcObject = remoteStream;
            
            // Forzamos el play por si el navegador lo detuvo
            remoteVideo.play().catch(e => console.log("Error en auto-play:", e));
        });

        // Si hay error de conexión
        peer.on('error', (err) => {
            info.innerText = "Error: " + err.type;
            console.error(err);
        });
    }
</script>
