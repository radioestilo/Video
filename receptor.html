<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor - RICARDOCASTELLAR</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        #video-wrap { width: 100%; max-width: 700px; margin: auto; position: relative; }
        video { width: 100%; border-radius: 15px; background: #000; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
        button { background: #28a745; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; margin-top: 15px; font-weight: bold; }
        #log { color: #888; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>PANEL DE VIGILANCIA</h3>
    <div id="video-wrap">
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <button onclick="iniciarMonitoreo()">CONECTAR AHORA</button>
    <p id="log">Listo para conectar con RICARDOCASTELLAR</p>

    <script>
        const remoteVideo = document.getElementById('remoteVideo');
        const log = document.getElementById('log');

        // Peer aleatorio para el monitor (no necesita ID fijo)
        const peer = new Peer();

        function iniciarMonitoreo() {
            log.innerText = "Llamando a la cámara...";
            
            // Llamamos al ID fijo de la cámara
            const call = peer.call('RICARDOCASTELLAR', new MediaStream());

            call.on('stream', (remoteStream) => {
                log.innerText = "CONECTADO - TRANSMITIENDO";
                log.style.color = "#0f0";
                remoteVideo.srcObject = remoteStream;
            });

            call.on('error', (err) => {
                log.innerText = "Error: " + err.type;
                log.style.color = "red";
            });
        }
    </script>
</body>
</html>
